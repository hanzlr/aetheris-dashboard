<!-- index.html -->

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetheris Dashboard — Login</title>
  <link rel="icon" type="image/png" href="assets/round-mascot.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <img src="assets/aetheris-banner.png" alt="Aetheris" class="banner" onerror="this.style.display='none'">
      <p>Admin Dashboard</p>
    </div>

    <div class="login-box">
      <h2>Login</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@aetheris.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button id="login-btn" class="btn-primary">Login</button>
    </div>

    <div class="login-footer">
      <a href="https://github.com/hanzlr/aetheris-bot" target="_blank" rel="noopener">
        ⭐ View Aetheris Bot on GitHub
      </a>
    </div>
  </div>

  <script type="module">
    import { login } from './js/auth.js'

    function doLogin() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      login(email, password)
    }

    document.getElementById('login-btn').addEventListener('click', doLogin)

    ;['email', 'password'].forEach((id) => {
      document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin()
      })
    })
  </script>

</body>
</html>
